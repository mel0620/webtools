    <script>
        let currentWidth = 1920;
        let currentHeight = 1080;
        let currentZoom = 1;

        const urlInput = document.getElementById('urlInput');
        const loadBtn = document.getElementById('loadBtn');
        const widthSlider = document.getElementById('widthSlider');
        const heightSlider = document.getElementById('heightSlider');
        const widthValue = document.getElementById('widthValue');
        const heightValue = document.getElementById('heightValue');
        const zoomValue = document.getElementById('zoomValue');
        const currentSize = document.getElementById('currentSize');
        const iframeWrapper = document.getElementById('iframeWrapper');
        const previewFrame = document.getElementById('previewFrame');
        const rotateBtn = document.getElementById('rotateBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');

        loadBtn.addEventListener('click', () => {
            let url = urlInput.value.trim();
            if (url && !url.startsWith('http')) {
                url = 'https://' + url;
            }
            if (url) {
                previewFrame.src = url;
            }
        });

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadBtn.click();
            }
        });

        widthSlider.addEventListener('input', (e) => {
            currentWidth = parseInt(e.target.value);
            widthValue.textContent = currentWidth;
            updateSize();
        });

        heightSlider.addEventListener('input', (e) => {
            currentHeight = parseInt(e.target.value);
            heightValue.textContent = currentHeight;
            updateSize();
        });

        rotateBtn.addEventListener('click', () => {
            const temp = currentWidth;
            currentWidth = currentHeight;
            currentHeight = temp;
            widthSlider.value = currentWidth;
            heightSlider.value = currentHeight;
            widthValue.textContent = currentWidth;
            heightValue.textContent = currentHeight;
            updateSize();
        });

        zoomInBtn.addEventListener('click', () => {
            currentZoom = Math.min(currentZoom + 0.1, 2);
            updateZoom();
        });

        zoomOutBtn.addEventListener('click', () => {
            currentZoom = Math.max(currentZoom - 0.1, 0.1);
            updateZoom();
        });

        function setSize(width, height) {
            currentWidth = width;
            currentHeight = height;
            widthSlider.value = width;
            heightSlider.value = height;
            widthValue.textContent = width;
            heightValue.textContent = height;
            updateSize();
        }

        function updateSize() {
            iframeWrapper.style.width = currentWidth + 'px';
            iframeWrapper.style.height = currentHeight + 'px';
            currentSize.textContent = `${currentWidth} × ${currentHeight}`;
        }

        function updateZoom() {
            iframeWrapper.style.transform = `scale(${currentZoom})`;
            zoomValue.textContent = Math.round(currentZoom * 100);
        }

        window.setSize = setSize;
    </script>
