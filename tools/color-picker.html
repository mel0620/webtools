  <!-- Main Content -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
    <div class="md:bg-neutral-800 rounded-2xl shadow-xl md:p-8 md:border border-neutral-700">
      <!-- Header -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-[#29C79F] rounded-lg flex items-center justify-center" aria-hidden="true">
          <svg class="w-6 h-6 text-white" fill="none" stroke="#fff" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
          </svg>
        </div>
        <h1 class="text-lg md:text-3xl font-bold text-white">Color Picker & Converter</h1>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Left Column: Color Picker & Display -->
        <div>
          <!-- Color Display -->
          <div id="colorDisplay" class="w-full h-64 rounded-2xl shadow-lg mb-6 transition-all duration-300" style="background-color: #6366f1;" role="img" aria-label="Selected color preview"></div>

          <!-- Color Picker -->
          <div class="bg-gray-50 rounded-xl p-6 mb-6">
            <label for="colorPicker" class="block text-sm font-medium text-gray-700 mb-3">Pick a Color</label>
            <input type="color" id="colorPicker" value="#6366f1" class="color-input" aria-describedby="colorPickerHint">
            <span id="colorPickerHint" class="sr-only">Use the color picker to select a color</span>
          </div>

          <!-- Color Formats -->
          <div class="bg-gray-50 rounded-xl p-6 space-y-4">
            <h2 class="font-semibold text-gray-600 mb-4">Color Formats</h2>

            <div>
              <label for="hexInput" class="block text-sm font-medium text-gray-500 mb-2">HEX</label>
              <div class="flex gap-2">
                <input type="text" id="hexInput" value="#6366f1" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg font-mono text-gray-500" aria-label="HEX color value">
                <button type="button" class="copy-btn px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-all" data-target="hexInput" aria-label="Copy HEX value">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </button>
              </div>
            </div>

            <div>
              <label for="rgbInput" class="block text-sm font-medium text-gray-500 mb-2">RGB</label>
              <div class="flex gap-2">
                <input type="text" id="rgbInput" value="rgb(99, 102, 241)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg font-mono text-gray-500" aria-label="RGB color value">
                <button type="button" class="copy-btn px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-all" data-target="rgbInput" aria-label="Copy RGB value">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </button>
              </div>
            </div>

            <div>
              <label for="hslInput" class="block text-sm font-medium text-gray-500 mb-2">HSL</label>
              <div class="flex gap-2">
                <input type="text" id="hslInput" value="hsl(239, 84%, 67%)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg font-mono text-gray-500" aria-label="HSL color value">
                <button type="button" class="copy-btn px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-all" data-target="hslInput" aria-label="Copy HSL value">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </button>

        <!-- Right Column: Palettes -->
        <div>
          <section class="mb-6">
            <h2 class="font-semibold text-gray-200 mb-3">Shades & Tints</h2>
            <div id="shadesGrid" class="grid grid-cols-5 gap-2" role="list" aria-label="Color shades and tints"></div>
          </section>

          <section class="mb-6">
            <h2 class="font-semibold text-gray-200 mb-3">Complementary</h2>
            <div id="complementaryGrid" class="grid grid-cols-2 gap-2" role="list" aria-label="Complementary colors"></div>
          </section>

          <section class="mb-6">
            <h2 class="font-semibold text-gray-200 mb-3">Analogous</h2>
            <div id="analogousGrid" class="grid grid-cols-3 gap-2" role="list" aria-label="Analogous colors"></div>
          </section>

          <section class="mb-6">
            <h2 class="font-semibold text-gray-200 mb-3">Triadic</h2>
            <div id="triadicGrid" class="grid grid-cols-3 gap-2" role="list" aria-label="Triadic colors"></div>
          </section>

          <section>
            <h2 class="font-semibold text-gray-200 mb-3">Split Complementary</h2>
            <div id="splitComplementaryGrid" class="grid grid-cols-3 gap-2" role="list" aria-label="Split complementary colors"></div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import {
      hexToRgb,
      rgbToHex,
      rgbToHsl,
      hslToRgb,
      formatRgb,
      formatHsl,
      generateShades,
      getComplementary,
      getAnalogous,
      getTriadic,
      getSplitComplementary,
    } from '../src/js/utils/color.js';
    import { copyToClipboard, copyFromInput } from '../src/js/utils/clipboard.js';

    // State
    let currentColor = { r: 99, g: 102, b: 241 };

    // DOM Elements
    const colorPicker = document.getElementById('colorPicker');
    const colorDisplay = document.getElementById('colorDisplay');
    const hexInput = document.getElementById('hexInput');
    const rgbInput = document.getElementById('rgbInput');
    const hslInput = document.getElementById('hslInput');

    // Update all displays
    function updateColor(rgb) {
      currentColor = rgb;
      const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
      const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

      colorDisplay.style.backgroundColor = hex;
      colorPicker.value = hex;
      hexInput.value = hex.toUpperCase();
      rgbInput.value = formatRgb(rgb);
      hslInput.value = formatHsl(hsl);

      generatePalettes(rgb);
    }

    // Generate color palettes
    function generatePalettes(rgb) {
      // Shades and Tints
      const shades = generateShades(rgb, 5);
      document.getElementById('shadesGrid').innerHTML = shades
        .map((shade) => createColorBox(shade.hex, shade))
        .join('');

      // Complementary
      const comp = getComplementary(rgb);
      const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
      document.getElementById('complementaryGrid').innerHTML = [
        createColorBox(hex, rgb),
        createColorBox(comp.hex, comp),
      ].join('');

      // Analogous
      const analogous = getAnalogous(rgb);
      document.getElementById('analogousGrid').innerHTML = analogous
        .map((c) => createColorBox(c.hex, c))
        .join('');

      // Triadic
      const triadic = getTriadic(rgb);
      document.getElementById('triadicGrid').innerHTML = triadic
        .map((c) => createColorBox(c.hex, c))
        .join('');

      // Split Complementary
      const splitComp = getSplitComplementary(rgb);
      document.getElementById('splitComplementaryGrid').innerHTML = splitComp
        .map((c) => createColorBox(c.hex, c))
        .join('');
    }

    // Create color box
    function createColorBox(hex, rgb) {
      return `
        <div class="group relative" role="listitem">
          <button
            type="button"
            class="w-full h-20 rounded-lg cursor-pointer transition-transform hover:scale-105 shadow-md border-0"
            style="background-color: ${hex};"
            data-rgb="${JSON.stringify(rgb).replace(/"/g, '&quot;')}"
            aria-label="Select color ${hex}"
          ></button>
          <div class="text-xs text-center mt-1 font-mono text-gray-400">${hex.toUpperCase()}</div>
        </div>
      `;
    }

    // Event Listeners
    colorPicker.addEventListener('input', (e) => {
      const rgb = hexToRgb(e.target.value);
      if (rgb) updateColor(rgb);
    });

    hexInput.addEventListener('input', (e) => {
      const hex = e.target.value;
      if (/^#[0-9A-F]{6}$/i.test(hex)) {
        const rgb = hexToRgb(hex);
        if (rgb) updateColor(rgb);
      }
    });

    rgbInput.addEventListener('input', (e) => {
      const match = e.target.value.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
      if (match) {
        const rgb = { r: parseInt(match[1], 10), g: parseInt(match[2], 10), b: parseInt(match[3], 10) };
        if (rgb.r <= 255 && rgb.g <= 255 && rgb.b <= 255) updateColor(rgb);
      }
    });

    hslInput.addEventListener('input', (e) => {
      const match = e.target.value.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
      if (match) {
        const h = parseInt(match[1], 10);
        const s = parseInt(match[2], 10);
        const l = parseInt(match[3], 10);
        if (h <= 360 && s <= 100 && l <= 100) {
          const rgb = hslToRgb(h, s, l);
          updateColor(rgb);
        }
      }
    });

    // Copy buttons
    document.querySelectorAll('.copy-btn').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const targetId = btn.dataset.target;
        await copyFromInput(targetId, btn);
      });
    });

    // Color box click delegation
    document.addEventListener('click', (e) => {
      const colorBtn = e.target.closest('[data-rgb]');
      if (colorBtn) {
        try {
          const rgb = JSON.parse(colorBtn.dataset.rgb);
          updateColor(rgb);
        } catch (err) {
          console.error('Error parsing RGB:', err);
        }
      }
    });

    // Mobile menu
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    mobileMenuBtn.addEventListener('click', () => {
      const isExpanded = mobileMenuBtn.getAttribute('aria-expanded') === 'true';
      mobileMenuBtn.setAttribute('aria-expanded', !isExpanded);
      mobileMenu.classList.toggle('hidden');
    });

    // Initialize
    updateColor(currentColor);
  </script>
