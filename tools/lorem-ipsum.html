              </svg>
            </div>

          </svg>
        </button>
      </div>
    </div>
    <div id="mobileMenu" class="hidden md:hidden border-t border-neutral-700 bg-neutral-800">
      <div class="px-4 py-4 space-y-3">
        <a href="../" class="block text-white font-medium hover:text-[#de4d44] transition-colors">Home</a>
        <a href="../#tools" class="block text-neutral-300 hover:text-white transition-colors">Tools</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
    <div class="md:bg-neutral-800 rounded-2xl shadow-xl md:p-8 md:border border-neutral-700">
      <!-- Header -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-[#29C79F] rounded-lg flex items-center justify-center" aria-hidden="true">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <h1 class="text-lg md:text-3xl font-bold text-white">Lorem Ipsum Generator</h1>
      </div>
      <p class="text-neutral-400 mb-8">Generate placeholder text for your designs and mockups</p>

      <!-- Options -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <!-- Type Selection -->
        <fieldset class="bg-neutral-700 rounded-xl p-6 border border-neutral-600">
          <legend class="text-sm font-medium text-neutral-300 mb-3">Type</legend>
          <div class="space-y-2">
            <label class="flex items-center cursor-pointer">
              <input type="radio" name="type" value="paragraphs" checked class="w-4 h-4 text-red-600">
              <span class="ml-3 text-neutral-200">Paragraphs</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="radio" name="type" value="sentences" class="w-4 h-4 text-red-600">
              <span class="ml-3 text-neutral-200">Sentences</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="radio" name="type" value="words" class="w-4 h-4 text-red-600">
              <span class="ml-3 text-neutral-200">Words</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="radio" name="type" value="lists" class="w-4 h-4 text-red-600">
              <span class="ml-3 text-neutral-200">List Items</span>
            </label>
          </div>
        </fieldset>

        <!-- Amount -->
        <div class="bg-neutral-700 rounded-xl p-6 border border-neutral-600">
          <label for="amountSlider" class="block text-sm font-medium text-neutral-300 mb-3">
            Amount: <span id="amountValue" class="text-[#29C79F]">5</span>
          </label>
          <input type="range" id="amountSlider" min="1" max="50" value="5" class="w-full mb-4">

          <label class="flex items-center cursor-pointer mt-4">
            <input type="checkbox" id="startWithLorem" checked class="w-4 h-4 text-red-600 rounded">
            <span class="ml-3 text-neutral-200">Start with "Lorem ipsum..."</span>
          </label>
        </div>
      </div>

      <!-- Quick Presets -->
      <div class="bg-neutral-700 rounded-xl p-6 border border-neutral-600 mb-6">
        <h2 class="text-sm font-medium text-neutral-300 mb-3">Quick Presets</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
          <button type="button" data-preset="short" class="preset-btn px-4 py-2 bg-neutral-600 hover:bg-neutral-500 text-neutral-200 rounded-lg transition-all text-sm">
            Short Text<br><span class="text-xs text-neutral-400">1-2 paragraphs</span>
          </button>
          <button type="button" data-preset="medium" class="preset-btn px-4 py-2 bg-neutral-600 hover:bg-neutral-500 text-neutral-200 rounded-lg transition-all text-sm">
            Medium Text<br><span class="text-xs text-neutral-400">3-5 paragraphs</span>
          </button>
          <button type="button" data-preset="long" class="preset-btn px-4 py-2 bg-neutral-600 hover:bg-neutral-500 text-neutral-200 rounded-lg transition-all text-sm">
            Long Text<br><span class="text-xs text-neutral-400">10+ paragraphs</span>
          </button>
          <button type="button" data-preset="headline" class="preset-btn px-4 py-2 bg-neutral-600 hover:bg-neutral-500 text-neutral-200 rounded-lg transition-all text-sm">
            Headline<br><span class="text-xs text-neutral-400">5-10 words</span>
          </button>
        </div>
      </div>

      <!-- Generate Button -->
      <button type="button" id="generateBtn" class="w-full bg-[#29C79F] hover:bg-[#22a884] text-white font-semibold py-4 px-8 rounded-xl shadow-lg transition-all mb-6">
        Generate Lorem Ipsum
      </button>

      <!-- Output -->
      <div class="bg-neutral-700 rounded-xl p-6 border border-neutral-600">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-semibold text-white">Generated Text</h2>
          <div class="flex gap-2">
            <button type="button" id="copyBtn" class="px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 transition-all flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
              </svg>
              Copy
            </button>
            <button type="button" id="clearBtn" class="px-4 py-2 bg-neutral-600 text-white text-sm rounded-lg hover:bg-neutral-500 transition-all">
              Clear
            </button>
          </div>
        </div>
        <div id="output" class="bg-neutral-600 rounded-lg p-6 text-neutral-200 leading-relaxed min-h-[300px] max-h-[600px] overflow-y-auto" aria-live="polite">
          <p class="text-neutral-500 italic">Click "Generate Lorem Ipsum" to create placeholder text...</p>
        </div>
        <div class="mt-4 flex items-center justify-between text-sm text-neutral-400">
          <span id="charCount">Characters: 0</span>
          <span id="wordCount">Words: 0</span>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { generateLorem, generateFromPreset, LOREM_PRESETS } from '../src/js/utils/lorem.js';
    import { copyToClipboard } from '../src/js/utils/clipboard.js';

    // DOM Elements
    const amountSlider = document.getElementById('amountSlider');
    const amountValue = document.getElementById('amountValue');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const output = document.getElementById('output');
    const charCount = document.getElementById('charCount');
    const wordCount = document.getElementById('wordCount');
    const startWithLorem = document.getElementById('startWithLorem');

    // Update amount display
    amountSlider.addEventListener('input', (e) => {
      amountValue.textContent = e.target.value;
    });

    // Generate lorem ipsum
    function generate() {
      const type = document.querySelector('input[name="type"]:checked').value;
      const count = parseInt(amountSlider.value, 10);
      const withLorem = startWithLorem.checked;

      const result = generateLorem({
        type,
        count,
        startWithLorem: withLorem,
        html: true,
      });

      output.innerHTML = result;
      updateStats(output.innerText);
    }

    // Update stats
    function updateStats(text) {
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      charCount.textContent = `Characters: ${chars}`;
      wordCount.textContent = `Words: ${words}`;
    }

    // Clear output
    function clearOutput() {
      output.innerHTML = '<p class="text-neutral-500 italic">Click "Generate Lorem Ipsum" to create placeholder text...</p>';
      updateStats('');
    }

    // Handle preset click
    function handlePreset(presetName) {
      const preset = LOREM_PRESETS[presetName];
      if (!preset) return;

      // Update UI to match preset
      document.querySelector(`input[name="type"][value="${preset.type}"]`).checked = true;
      amountSlider.value = preset.count;
      amountValue.textContent = preset.count;

      // Generate
      generate();
    }

    // Event Listeners
    generateBtn.addEventListener('click', generate);
    clearBtn.addEventListener('click', clearOutput);

    copyBtn.addEventListener('click', async () => {
      const text = output.innerText;
      if (!text || text.includes('Click "Generate Lorem Ipsum"')) return;
      await copyToClipboard(text, copyBtn);
    });

    // Preset buttons
    document.querySelectorAll('.preset-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const preset = btn.dataset.preset;
        handlePreset(preset);
      });
    });

    // Mobile menu
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    mobileMenuBtn.addEventListener('click', () => {
      const isExpanded = mobileMenuBtn.getAttribute('aria-expanded') === 'true';
      mobileMenuBtn.setAttribute('aria-expanded', !isExpanded);
      mobileMenu.classList.toggle('hidden');
    });
  </script>
  <script type="module" src="/src/js/tool-page.js"></script>
</body>
</html>
