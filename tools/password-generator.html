<body>
  <main class="flex-1 max-w-2xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
    <div class="md:bg-neutral-800 rounded-2xl shadow-xl md:p-8 md:border border-neutral-700">

      <!-- Header -->
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-[#29C79F] rounded-lg flex items-center justify-center shrink-0" aria-hidden="true">
          <i class="fa-solid fa-key text-black text-lg"></i>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold text-white">Password Generator</h1>
      </div>
      <p class="text-neutral-400 text-sm mb-8 ml-[52px]">Cryptographically secure <i class="fa-solid fa-circle text-[5px] align-middle mx-1.5 opacity-40"></i> never sent anywhere</p>

      <!-- Output -->
      <div class="bg-neutral-900 rounded-xl border border-neutral-700 p-4 mb-4 flex items-center gap-3">
        <span id="passwordOutput" class="flex-1 font-mono text-lg text-white break-all select-all" aria-live="polite" aria-label="Generated password">Click Generate</span>
        <button id="revealBtn" type="button" class="text-neutral-400 hover:text-white p-1 transition-colors shrink-0" aria-label="Toggle password visibility" title="Toggle visibility">
          <i class="fa-solid fa-eye text-base"></i>
        </button>
        <button id="copyBtn" type="button" class="text-neutral-400 hover:text-[#29C79F] p-1 transition-colors shrink-0" aria-label="Copy password" title="Copy">
          <i class="fa-solid fa-copy text-base"></i>
        </button>
      </div>

      <!-- Strength bar -->
      <div class="mb-6">
        <div class="h-2 rounded-full bg-neutral-700 overflow-hidden">
          <div id="strengthBar" class="h-full rounded-full transition-all duration-500 w-0"></div>
        </div>
        <div class="flex justify-between items-center mt-1.5">
          <span id="strengthLabel" class="text-xs text-neutral-500"><i class="fa-solid fa-minus opacity-30 text-xs"></i></span>
          <span id="entropyLabel" class="text-xs text-neutral-500"></span>
        </div>
      </div>

      <!-- Settings -->
      <div class="space-y-5 mb-8">

        <!-- Length -->
        <div>
          <div class="flex justify-between mb-2">
            <label for="lengthRange" class="text-sm font-medium text-neutral-300">Length</label>
            <span id="lengthVal" class="text-sm font-mono font-bold text-[#29C79F]">20</span>
          </div>
          <input type="range" id="lengthRange" min="4" max="128" value="20"
            class="w-full accent-[#29C79F]" aria-label="Password length">
        </div>

        <!-- Character sets -->
        <div>
          <p class="text-sm font-medium text-neutral-300 mb-3">Character Types</p>
          <div class="grid grid-cols-2 gap-3">
            <label class="flex items-center gap-2.5 cursor-pointer select-none group">
              <input type="checkbox" id="useUpper" checked class="w-4 h-4 accent-[#29C79F]">
              <span class="text-sm text-neutral-300 group-hover:text-white transition-colors">Uppercase <span class="text-neutral-500 font-mono text-xs">(A–Z)</span></span>
            </label>
            <label class="flex items-center gap-2.5 cursor-pointer select-none group">
              <input type="checkbox" id="useLower" checked class="w-4 h-4 accent-[#29C79F]">
              <span class="text-sm text-neutral-300 group-hover:text-white transition-colors">Lowercase <span class="text-neutral-500 font-mono text-xs">(a–z)</span></span>
            </label>
            <label class="flex items-center gap-2.5 cursor-pointer select-none group">
              <input type="checkbox" id="useDigits" checked class="w-4 h-4 accent-[#29C79F]">
              <span class="text-sm text-neutral-300 group-hover:text-white transition-colors">Digits <span class="text-neutral-500 font-mono text-xs">(0–9)</span></span>
            </label>
            <label class="flex items-center gap-2.5 cursor-pointer select-none group">
              <input type="checkbox" id="useSymbols" checked class="w-4 h-4 accent-[#29C79F]">
              <span class="text-sm text-neutral-300 group-hover:text-white transition-colors">Symbols <span class="text-neutral-500 font-mono text-xs">(!@#…)</span></span>
            </label>
          </div>
        </div>

        <!-- Options -->
        <div>
          <p class="text-sm font-medium text-neutral-300 mb-3">Options</p>
          <div class="space-y-2.5">
            <label class="flex items-center gap-2.5 cursor-pointer select-none group">
              <input type="checkbox" id="excludeAmbiguous" class="w-4 h-4 accent-[#29C79F]">
              <span class="text-sm text-neutral-300 group-hover:text-white transition-colors">
                Exclude ambiguous chars
                <span class="text-neutral-500 font-mono text-xs">(0 O l I 1)</span>
              </span>
            </label>
            <label class="flex items-center gap-2.5 cursor-pointer select-none group">
              <input type="checkbox" id="noRepeat" class="w-4 h-4 accent-[#29C79F]">
              <span class="text-sm text-neutral-300 group-hover:text-white transition-colors">No repeated characters</span>
            </label>
          </div>
        </div>

        <!-- Bulk -->
        <div>
          <div class="flex justify-between mb-2">
            <label for="bulkCount" class="text-sm font-medium text-neutral-300">Bulk Generate</label>
            <span class="text-xs text-neutral-500">generates multiple passwords at once</span>
          </div>
          <div class="flex gap-2">
            <input type="number" id="bulkCount" min="1" max="50" value="1"
              class="w-20 px-3 py-2 bg-neutral-700 border border-neutral-600 text-white rounded-lg text-sm font-mono focus:outline-none focus:ring-1 focus:ring-[#29C79F]">
            <button id="bulkCopyBtn" type="button"
              class="text-xs px-3 py-2 bg-neutral-700 hover:bg-neutral-600 border border-neutral-600 text-neutral-300 hover:text-white rounded-lg transition-all hidden">
              <i class="fa-solid fa-copy mr-1"></i>Copy All
            </button>
          </div>
          <div id="bulkList" class="mt-3 space-y-1.5 max-h-48 overflow-y-auto hidden"></div>
        </div>
      </div>

      <!-- Generate button -->
      <button id="generateBtn" type="button"
        class="w-full py-3 bg-[#29C79F] hover:bg-[#3ee0b5] text-black font-bold rounded-xl transition-all text-base shadow-lg hover:shadow-[#29C79F]/25">
        <i class="fa-solid fa-shuffle mr-2"></i>Generate Password
      </button>

    </div>
  </main>

  <script type="module">
    import { copyToClipboard } from '../src/js/utils/clipboard.js';

    const CHARS = {
      upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower:   'abcdefghijklmnopqrstuvwxyz',
      digits:  '0123456789',
      symbols: '!@#$%^&*()-_=+[]{}|;:,.<>?',
      ambiguous: /[0Ol1I]/g,
    };

    const $ = id => document.getElementById(id);
    const lengthRange      = $('lengthRange');
    const lengthVal        = $('lengthVal');
    const useUpper         = $('useUpper');
    const useLower         = $('useLower');
    const useDigits        = $('useDigits');
    const useSymbols       = $('useSymbols');
    const excludeAmbiguous = $('excludeAmbiguous');
    const noRepeat         = $('noRepeat');
    const bulkCount        = $('bulkCount');
    const passwordOutput   = $('passwordOutput');
    const strengthBar      = $('strengthBar');
    const strengthLabel    = $('strengthLabel');
    const entropyLabel     = $('entropyLabel');
    const bulkList         = $('bulkList');
    const bulkCopyBtn      = $('bulkCopyBtn');
    const revealBtn        = $('revealBtn');
    const copyBtn          = $('copyBtn');
    const generateBtn      = $('generateBtn');

    let hidden = false;
    let lastPassword = '';

    function buildCharset() {
      let pool = '';
      if (useUpper.checked)   pool += CHARS.upper;
      if (useLower.checked)   pool += CHARS.lower;
      if (useDigits.checked)  pool += CHARS.digits;
      if (useSymbols.checked) pool += CHARS.symbols;
      if (excludeAmbiguous.checked) pool = pool.replace(CHARS.ambiguous, '');
      return pool;
    }

    function generate() {
      const pool   = buildCharset();
      if (!pool) return '';
      const length = parseInt(lengthRange.value);
      const buf    = new Uint32Array(length);
      crypto.getRandomValues(buf);
      const used = new Set();
      let pass = '';
      for (let i = 0; i < length; i++) {
        let c;
        if (noRepeat.checked) {
          const available = pool.split('').filter(ch => !used.has(ch));
          if (!available.length) break;
          c = available[buf[i] % available.length];
          used.add(c);
        } else {
          c = pool[buf[i] % pool.length];
        }
        pass += c;
      }
      return pass;
    }

    function entropy(pass) {
      const pool = buildCharset();
      if (!pool || !pass.length) return 0;
      return Math.log2(Math.pow(pool.length, pass.length));
    }

    function updateStrength(pass) {
      const bits = entropy(pass);
      let label, color, width;
      if (bits < 28)      { label = 'Very Weak';  color = '#ef4444'; width = '15%'; }
      else if (bits < 36) { label = 'Weak';        color = '#f97316'; width = '30%'; }
      else if (bits < 60) { label = 'Fair';        color = '#eab308'; width = '55%'; }
      else if (bits < 80) { label = 'Strong';      color = '#22c55e'; width = '80%'; }
      else                { label = 'Very Strong'; color = '#29C79F'; width = '100%'; }
      strengthBar.style.width = width;
      strengthBar.style.background = color;
      strengthLabel.textContent = label;
      strengthLabel.style.color = color;
      entropyLabel.textContent = `${Math.round(bits)} bits entropy`;
    }

    function displayPassword(pass) {
      lastPassword = pass;
      passwordOutput.textContent = hidden
        ? '•'.repeat(pass.length)
        : pass;
      updateStrength(pass);
    }

    function run() {
      const count = Math.min(50, Math.max(1, parseInt(bulkCount.value) || 1));
      if (count === 1) {
        const p = generate();
        displayPassword(p);
        bulkList.classList.add('hidden');
        bulkCopyBtn.classList.add('hidden');
      } else {
        const passwords = Array.from({ length: count }, generate);
        displayPassword(passwords[0]);
        bulkList.classList.remove('hidden');
        bulkCopyBtn.classList.remove('hidden');
        bulkList.innerHTML = passwords.map(p => `
          <div class="flex items-center justify-between gap-2 bg-neutral-900 rounded-lg px-3 py-2 border border-neutral-700">
            <span class="font-mono text-sm text-neutral-200 truncate">${p}</span>
            <button type="button" data-pw="${p.replace(/"/g, '&quot;')}"
              class="copy-single text-neutral-500 hover:text-[#29C79F] shrink-0 transition-colors">
              <i class="fa-solid fa-copy text-xs"></i>
            </button>
          </div>`).join('');
        bulkCopyBtn.dataset.all = passwords.join('\n');
      }
    }

    // Events
    lengthRange.addEventListener('input', () => {
      lengthVal.textContent = lengthRange.value;
      run();
    });
    [useUpper, useLower, useDigits, useSymbols, excludeAmbiguous, noRepeat].forEach(el =>
      el.addEventListener('change', run)
    );
    generateBtn.addEventListener('click', run);
    bulkCount.addEventListener('change', run);

    copyBtn.addEventListener('click', async () => {
      if (!lastPassword) return;
      await copyToClipboard(lastPassword, copyBtn);
    });

    bulkCopyBtn.addEventListener('click', async () => {
      if (bulkCopyBtn.dataset.all) {
        await copyToClipboard(bulkCopyBtn.dataset.all, bulkCopyBtn);
      }
    });

    revealBtn.addEventListener('click', () => {
      hidden = !hidden;
      revealBtn.querySelector('i').className = hidden
        ? 'fa-solid fa-eye-slash text-base'
        : 'fa-solid fa-eye text-base';
      displayPassword(lastPassword);
    });

    bulkList.addEventListener('click', async e => {
      const btn = e.target.closest('.copy-single');
      if (btn) await copyToClipboard(btn.dataset.pw, btn);
    });

    // Init
    run();
  </script>
  <script type="module" src="/src/js/tool-page.js"></script>
</body>
</html>
