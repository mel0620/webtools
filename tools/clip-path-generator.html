  <style>
    /* ── Preview ─────────────────────────────────────────── */
    #previewWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 20px 20px;
    }
    #previewContent {
      position: absolute; inset: 0;
      transition: clip-path 0.04s linear;
    }
    /* SVG overlay is a sibling, NOT inside overflow:hidden */
    #svgOverlay {
      position: absolute; top: 0; left: 0;
      pointer-events: none; overflow: visible;
    }
    .handle         { pointer-events: all; cursor: grab; }
    .handle:active  { cursor: grabbing; }
    .handle-circle  { fill: #29C79F; stroke: #fff; stroke-width: 2.5;
                      transition: r .1s; }
    .handle-circle:hover, .handle-circle.hovered { r: 10; }
    .handle-label   { fill: #fff; font-size: 10px; font-weight: 700;
                      font-family: monospace; dominant-baseline: central;
                      text-anchor: middle; pointer-events: none; }
    .shape-fill     { fill: rgba(41,199,159,0.15); stroke: #29C79F;
                      stroke-width: 2; stroke-linejoin: round; }
    .ghost-rect     { fill: none; stroke: rgba(255,255,255,0.12);
                      stroke-width: 1; stroke-dasharray: 5,4; }
    .edge-zone      { fill: transparent; stroke: transparent;
                      stroke-width: 14; cursor: copy; pointer-events: stroke; }
    /* Drag tooltip */
    #dragTip {
      position: fixed; z-index: 9999;
      background: rgba(0,0,0,0.88); color: #29C79F;
      font: 700 11px/1 monospace; padding: 4px 8px;
      border-radius: 6px; pointer-events: none;
      display: none; white-space: nowrap;
      border: 1px solid rgba(41,199,159,0.35);
    }
    /* Preview content themes */
    .pv-gradient { background: linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 75%,#29C79F 100%); }
    .pv-photo    { background: linear-gradient(160deg,#667eea 0%,#764ba2 50%,#f64f59 100%); }
    .pv-solid    { background: #29C79F; }
    .pv-light    { background: linear-gradient(135deg,#e0f7f1,#b2dfdb,#4dd0e1); }
    /* Active preview btn */
    .pv-btn.active { border-color: #29C79F !important; transform: scale(1.15); }
    input[type=range] { accent-color: #29C79F; }
    .shape-btn.active {
      border-color: #29C79F !important;
      background: rgba(41,199,159,0.1) !important;
      color: #29C79F !important;
    }
  </style>

<body>
  <div id="dragTip"></div>

  <main class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
    <div class="md:bg-neutral-800 rounded-2xl shadow-xl md:p-8 md:border border-neutral-700">

      <!-- Header -->
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-[#29C79F] rounded-lg flex items-center justify-center shrink-0" aria-hidden="true">
          <i class="fa-solid fa-scissors text-black text-lg"></i>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold text-white">CSS Clip-Path Generator</h1>
      </div>
      <p class="text-neutral-400 text-sm mb-6 ml-[52px]">Drag handles &bull; click an edge to insert a point &bull; all shapes supported</p>

      <div class="grid grid-cols-1 lg:grid-cols-[1fr_1.45fr] gap-8">

        <!-- ── Left: Controls ─────────────────────────────── -->

          <!-- Shape selector -->

            <label class="text-xs font-semibold uppercase tracking-widest text-[#29C79F] block mb-2">Shape</label>
            <div class="grid grid-cols-4 gap-2">

                </div>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <div class="flex justify-between text-xs text-neutral-400 mb-1"><span>Center X</span><span id="ellCX" class="font-mono text-[#29C79F]">50%</span></div>
                  <input type="range" id="slEllCX" min="0" max="100" value="50" class="w-full">
                </div>
                <div>

            <!-- Inset -->

                </div>
                <div>
                  <div class="flex justify-between text-xs text-neutral-400 mb-1"><span>Right</span><span id="insetR2" class="font-mono text-[#29C79F]">10%</span></div>

        <!-- ── Right: Preview + CSS ───────────────────────── -->

                style="background:linear-gradient(135deg,#1a1a2e,#29C79F)" title="Gradient"></button>
              <button type="button" data-pv="photo" class="pv-btn w-6 h-6 rounded-full border-2 border-neutral-600 transition-all"
                style="background:linear-gradient(160deg,#667eea,#f64f59)" title="Photo-like"></button>
              <button type="button" data-pv="solid" class="pv-btn w-6 h-6 rounded-full border-2 border-neutral-600 transition-all"
                style="background:#29C79F" title="Solid teal"></button>
              <button type="button" data-pv="light" class="pv-btn w-6 h-6 rounded-full border-2 border-neutral-600 transition-all"
                style="background:linear-gradient(135deg,#e0f7f1,#4dd0e1)" title="Light gradient"></button>
            </div>
          </div>

          <!-- Preview box (checkerboard = cut-away area) -->
          <div style="position:relative;">
            <div id="previewWrap">
              <!-- Clipped content layer -->
              <div id="previewContent" class="pv-gradient">
                <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;">
                  <div style="width:44px;height:44px;background:rgba(255,255,255,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center;">
                    <svg width="26" height="26" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
                  </div>
                  <div style="color:rgba(255,255,255,0.95);font-size:17px;font-weight:700;letter-spacing:-0.2px;text-align:center;">Clip-Path Preview</div>
                  <div style="color:rgba(255,255,255,0.45);font-size:11px;">Drag handles to reshape</div>
                  <div style="display:flex;gap:6px;margin-top:2px;">
                    <div style="height:5px;width:55px;background:rgba(255,255,255,0.18);border-radius:99px;overflow:hidden;"><div style="height:100%;width:72%;background:rgba(255,255,255,0.6);border-radius:99px;"></div></div>
                    <div style="height:5px;width:35px;background:rgba(255,255,255,0.18);border-radius:99px;overflow:hidden;"><div style="height:100%;width:40%;background:rgba(255,255,255,0.35);border-radius:99px;"></div></div>

          <!-- CSS output -->
          <div class="bg-neutral-900 rounded-xl border border-neutral-700 p-4">

              <div class="flex items-center gap-3">
                <label class="flex items-center gap-1.5 cursor-pointer select-none">
                  <input type="checkbox" id="animToggle" class="w-3.5 h-3.5">

                  class="text-xs px-3 py-1.5 bg-neutral-700 hover:bg-neutral-600 text-neutral-300 hover:text-white rounded-lg transition-all border border-neutral-600">
                  <i class="fa-solid fa-copy mr-1"></i>Copy

  </main>

  <script type="module">
    import { copyToClipboard } from '../src/js/utils/clipboard.js';

    // ── State ──────────────────────────────────────────────────────────────
    let currentShape = 'polygon';
    let points = [[50,0],[100,100],[0,100]];
    let circ   = { r:50, cx:50, cy:50 };
    let ell    = { rx:50, ry:30, cx:50, cy:50 };
    let ins    = { t:10, r:10, b:10, l:10, round:0 };
    let animate = false;

    // ── Presets ────────────────────────────────────────────────────────────
    const PRESETS = {
      Triangle:      [[50,0],[100,100],[0,100]],
      Arrow:         [[0,0],[60,0],[100,50],[60,100],[0,100],[20,50]],
      Hexagon:       [[50,0],[100,25],[100,75],[50,100],[0,75],[0,25]],
      Pentagon:      [[50,0],[100,38],[82,100],[18,100],[0,38]],
      Chevron:       [[0,0],[75,0],[100,50],[75,100],[0,100],[25,50]],
      Star:          [[50,0],[61,35],[98,35],[68,57],[79,91],[50,70],[21,91],[32,57],[2,35],[39,35]],
      Diamond:       [[50,0],[100,50],[50,100],[0,50]],
      Parallelogram: [[25,0],[100,0],[75,100],[0,100]],
      Notch:         [[0,0],[100,0],[100,100],[75,75],[25,75],[0,100]],
      Message:       [[0,0],[100,0],[100,70],[60,70],[50,100],[40,70],[0,70]],
    };

    // ── DOM ────────────────────────────────────────────────────────────────
    const previewWrap    = document.getElementById('previewWrap');
    const previewContent = document.getElementById('previewContent');
    const svgEl          = document.getElementById('svgOverlay');
    const cssOut         = document.getElementById('cssOut');
    const copyCssBtn     = document.getElementById('copyCssBtn');
    const presetBtnsWrap = document.getElementById('presetBtns');
    const pointList      = document.getElementById('pointList');
    const ptCount        = document.getElementById('ptCount');
    const pointEditor    = document.getElementById('pointEditor');
    const shapeControls  = document.getElementById('shapeControls');
    const presetRow      = document.getElementById('presetRow');
    const shapeHint      = document.getElementById('shapeHint');
    const dragTip        = document.getElementById('dragTip');
    const animToggle     = document.getElementById('animToggle');

    // ── Preset buttons ─────────────────────────────────────────────────────
    Object.keys(PRESETS).forEach(name => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = name;
      btn.className = 'text-xs px-2.5 py-1.5 bg-neutral-700 hover:bg-neutral-600 text-neutral-300 hover:text-white rounded-lg border border-neutral-600 transition-all';
      btn.addEventListener('click', () => {
        points = PRESETS[name].map(p => [...p]);
        render(); renderPointList();
      });
      presetBtnsWrap.appendChild(btn);
    });

    // ── Build CSS clip-path string ─────────────────────────────────────────
    function buildClipPath() {
      if (currentShape === 'polygon') {
        return `polygon(${points.map(p => `${p[0]}% ${p[1]}%`).join(', ')})`;
      } else if (currentShape === 'circle') {
        return `circle(${circ.r}% at ${circ.cx}% ${circ.cy}%)`;
      } else if (currentShape === 'ellipse') {
        return `ellipse(${ell.rx}% ${ell.ry}% at ${ell.cx}% ${ell.cy}%)`;
      } else {
        const rd = ins.round > 0 ? ` round ${ins.round}%` : '';
        return `inset(${ins.t}% ${ins.r}% ${ins.b}% ${ins.l}%${rd})`;
      }
    }

    // ── Convert between % and px (relative to previewWrap) ────────────────
    function pctToPx(px, py) {
      const r = previewWrap.getBoundingClientRect();
      return [r.width * px / 100, r.height * py / 100];
    }
    function pxToPct(x, y) {
      const r = previewWrap.getBoundingClientRect();
      return [
        Math.min(100, Math.max(0, Math.round(x / r.width  * 100))),
        Math.min(100, Math.max(0, Math.round(y / r.height * 100))),
      ];
    }

    // ── Main render ────────────────────────────────────────────────────────
    function render() {
      const cp = buildClipPath();
      const withAnim = animate
        ? `clip-path: ${cp};\n-webkit-clip-path: ${cp};\ntransition: clip-path 0.4s ease;`
        : `clip-path: ${cp};\n-webkit-clip-path: ${cp};`;

      previewContent.style.clipPath = cp;
      previewContent.style.webkitClipPath = cp;
      previewContent.style.transition = animate ? 'clip-path 0.4s ease' : '';
      if (cssOut) cssOut.textContent = withAnim;
      ptCount.textContent = currentShape === 'polygon' ? `(${points.length})` : '';
      drawOverlay();
    }

    // ── SVG overlay ────────────────────────────────────────────────────────
    function drawOverlay() {
      svgEl.innerHTML = '';
      const rect = previewWrap.getBoundingClientRect();
      const W = rect.width, H = rect.height;
      if (!W || !H) return;

      svgEl.style.width  = W + 'px';
      svgEl.style.height = H + 'px';

      if (currentShape !== 'polygon') return;

      // Dashed ghost border (full rect = extent of the element)
      const ghostRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      ghostRect.setAttribute('x', 1); ghostRect.setAttribute('y', 1);
      ghostRect.setAttribute('width', W - 2); ghostRect.setAttribute('height', H - 2);
      ghostRect.setAttribute('class','ghost-rect');
      svgEl.appendChild(ghostRect);

      // Filled + outlined polygon
      const pxPts = points.map(p => pctToPx(...p));
      const ptStr = pxPts.map(p => p.join(',')).join(' ');
      const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      poly.setAttribute('points', ptStr);
      poly.setAttribute('class','shape-fill');
      svgEl.appendChild(poly);

      // Invisible fat edge zones → click to insert point
      for (let i = 0; i < points.length; i++) {
        const j = (i + 1) % points.length;
        const [x1,y1] = pxPts[i];
        const [x2,y2] = pxPts[j];
        const zone = document.createElementNS('http://www.w3.org/2000/svg','line');
        zone.setAttribute('x1', x1); zone.setAttribute('y1', y1);
        zone.setAttribute('x2', x2); zone.setAttribute('y2', y2);
        zone.setAttribute('class','edge-zone');
        zone.dataset.edgeA = i;
        svgEl.appendChild(zone);
      }

      // Draggable numbered handles
      pxPts.forEach(([hx, hy], i) => {
        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        g.setAttribute('class','handle');
        g.dataset.idx = i;

        const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx', hx); c.setAttribute('cy', hy);
        c.setAttribute('r', 8);
        c.setAttribute('class','handle-circle');
        g.appendChild(c);

        const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
        lbl.setAttribute('x', hx); lbl.setAttribute('y', hy);
        lbl.setAttribute('class','handle-label');
        lbl.textContent = i + 1;
        g.appendChild(lbl);

        svgEl.appendChild(g);
      });

      attachHandleEvents();
      attachEdgeClickEvents();
    }

    // ── Draggable handles ──────────────────────────────────────────────────
    function attachHandleEvents() {
      svgEl.querySelectorAll('.handle').forEach(g => {
        const idx = parseInt(g.dataset.idx);

        function getXY(e) {
          const rect = previewWrap.getBoundingClientRect();
          const cx = e.touches ? e.touches[0].clientX : e.clientX;
          const cy = e.touches ? e.touches[0].clientY : e.clientY;
          return [cx - rect.left, cy - rect.top];
        }

        function onMove(e) {
          e.preventDefault();
          const [x, y] = getXY(e);
          const [px, py] = pxToPct(x, y);
          points[idx] = [px, py];
          render(); renderPointList();
          const ex = e.touches ? e.touches[0].clientX : e.clientX;
          const ey = e.touches ? e.touches[0].clientY : e.clientY;
          dragTip.style.display = 'block';
          dragTip.style.left = (ex + 15) + 'px';
          dragTip.style.top  = (ey - 32) + 'px';
          dragTip.textContent = `${px}%  ${py}%`;
        }

        function onUp() {
          dragTip.style.display = 'none';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onUp);
        }

        g.addEventListener('mousedown', e => {
          e.preventDefault();
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
        g.addEventListener('touchstart', e => {
          e.preventDefault();
          document.addEventListener('touchmove', onMove, { passive: false });
          document.addEventListener('touchend', onUp);
        }, { passive: false });
      });
    }

    // ── Click edge to insert point ─────────────────────────────────────────
    function attachEdgeClickEvents() {
      svgEl.querySelectorAll('.edge-zone').forEach(line => {
        line.addEventListener('click', e => {
          if (points.length >= 16) return;
          const rect = previewWrap.getBoundingClientRect();
          const [px, py] = pxToPct(e.clientX - rect.left, e.clientY - rect.top);
          const after = parseInt(line.dataset.edgeA);
          points.splice(after + 1, 0, [px, py]);
          render(); renderPointList();
        });
      });
    }

    // ── Point number inputs ────────────────────────────────────────────────
    function renderPointList() {
      pointList.innerHTML = points.map((p, i) => `
        <div class="flex items-center gap-2">
          <span class="text-xs text-[#29C79F] font-mono font-bold w-5 text-right shrink-0">${i + 1}</span>
          <div class="flex items-center gap-1 flex-1">
            <span class="text-xs text-neutral-600">X</span>
            <input type="number" min="0" max="100" value="${p[0]}"
              class="w-14 px-2 py-1 bg-neutral-700 border border-neutral-600 text-white rounded text-xs font-mono focus:outline-none focus:ring-1 focus:ring-[#29C79F]"
              data-pt="${i}" data-coord="0" aria-label="Point ${i+1} X">
            <span class="text-xs text-neutral-600">Y</span>
            <input type="number" min="0" max="100" value="${p[1]}"
              class="w-14 px-2 py-1 bg-neutral-700 border border-neutral-600 text-white rounded text-xs font-mono focus:outline-none focus:ring-1 focus:ring-[#29C79F]"
              data-pt="${i}" data-coord="1" aria-label="Point ${i+1} Y">
            <span class="text-xs text-neutral-600">%</span>
          </div>
          ${points.length > 3 ? `
          <button type="button" class="del-pt text-neutral-600 hover:text-red-400 transition-colors text-xs shrink-0" data-idx="${i}">
            <i class="fa-solid fa-xmark"></i>
          </button>` : ''}
        </div>`).join('');

      pointList.querySelectorAll('input[data-pt]').forEach(inp => {
        inp.addEventListener('input', () => {
          points[parseInt(inp.dataset.pt)][parseInt(inp.dataset.coord)] =
            Math.min(100, Math.max(0, parseInt(inp.value) || 0));
          render();
        });
      });
      pointList.querySelectorAll('.del-pt').forEach(btn => {
        btn.addEventListener('click', () => {
          if (points.length <= 3) return;
          points.splice(parseInt(btn.dataset.idx), 1);
          render(); renderPointList();
        });
      });
    }

    // ── Shape type switcher ────────────────────────────────────────────────
    document.querySelectorAll('.shape-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentShape = btn.dataset.shape;
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const isPoly = currentShape === 'polygon';
        pointEditor.classList.toggle('hidden', !isPoly);
        presetRow.classList.toggle('hidden', !isPoly);
        shapeControls.classList.toggle('hidden', isPoly);
        shapeHint.textContent = isPoly
          ? '\u2014 drag handles, click edge to add'
          : '\u2014 adjust sliders';
        document.querySelectorAll('#circleControls,#ellipseControls,#insetControls')
          .forEach(el => el.classList.add('hidden'));
        if (!isPoly) document.getElementById(currentShape + 'Controls').classList.remove('hidden');
        render();
      });
    });

    // ── Add / remove points ────────────────────────────────────────────────
    document.getElementById('addPtBtn').addEventListener('click', () => {
      if (points.length >= 16) return;
      const [ax, ay] = points[points.length - 1];
      const [bx, by] = points[0];
      points.push([Math.round((ax + bx) / 2), Math.round((ay + by) / 2)]);
      render(); renderPointList();
    });
    document.getElementById('delPtBtn').addEventListener('click', () => {
      if (points.length <= 3) return;
      points.pop();
      render(); renderPointList();
    });

    // ── Sliders (generic binder) ───────────────────────────────────────────
    function bindSliders(pairs) {
      pairs.forEach(([id, obj, key, lblId]) => {
        document.getElementById(id).addEventListener('input', e => {
          obj[key] = parseInt(e.target.value);
          document.getElementById(lblId).textContent = obj[key] + '%';
          render();
        });
      });
    }
    bindSliders([
      ['slCircleR',    circ, 'r',     'circleR'],
      ['slCircleCX',   circ, 'cx',    'circleCX'],
      ['slCircleCY',   circ, 'cy',    'circleCY'],
      ['slEllRX',      ell,  'rx',    'ellRX'],
      ['slEllRY',      ell,  'ry',    'ellRY'],
      ['slEllCX',      ell,  'cx',    'ellCX'],
      ['slEllCY',      ell,  'cy',    'ellCY'],
      ['slInsetT',     ins,  't',     'insetT'],
      ['slInsetR',     ins,  'r',     'insetR2'],
      ['slInsetB',     ins,  'b',     'insetBt'],
      ['slInsetL',     ins,  'l',     'insetLt'],
      ['slInsetRound', ins,  'round', 'insetRnd'],
    ]);

    // ── Preview background theme ───────────────────────────────────────────
    document.querySelectorAll('.pv-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const pv = btn.dataset.pv;
        previewContent.className = `pv-${pv}`;
        previewContent.style.clipPath = buildClipPath();
        document.querySelectorAll('.pv-btn').forEach(b => {
          b.classList.remove('active');
          b.style.borderColor = '';
        });
        btn.classList.add('active');
      });
    });

    // ── Animate toggle ─────────────────────────────────────────────────────
    animToggle.addEventListener('change', () => { animate = animToggle.checked; render(); });

    // ── Copy CSS ───────────────────────────────────────────────────────────
    copyCssBtn.addEventListener('click', () =>
      copyToClipboard(cssOut.textContent, copyCssBtn));

    // ── Sync SVG size on resize ────────────────────────────────────────────
    new ResizeObserver(() => render()).observe(previewWrap);

    // ── Init ───────────────────────────────────────────────────────────────
    render();
    renderPointList();
  </script>
  <script type="module" src="/src/js/tool-page.js"></script>
</body>
</html>
